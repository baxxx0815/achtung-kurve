<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHTUNG DIE KURVE</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
:root{--bg:#070d13;--a:#00ffe7;--r:#ff0055;--p:rgba(8,18,30,.95);--b:rgba(0,255,231,.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#e0f0ff;font-family:'Share Tech Mono',monospace;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,231,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,231,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%;height:100%;padding:20px;}
.screen.on{display:flex;}
.TT{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,52px);font-weight:900;letter-spacing:.1em;color:var(--a);text-shadow:0 0 28px rgba(0,255,231,.8);text-align:center;animation:fl 5s infinite;}
@keyframes fl{0%,93%,96%,100%{opacity:1}94%,95%{opacity:.5}}
.panel{background:var(--p);border:1px solid var(--b);border-radius:3px;padding:22px 26px;box-shadow:0 0 18px rgba(0,255,231,.07);position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--a),transparent);opacity:.4;}
.btn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:.13em;padding:10px 15px;border:1px solid var(--a);background:transparent;color:var(--a);cursor:pointer;transition:all .15s;text-transform:uppercase;border-radius:2px;}
.btn:hover{background:rgba(0,255,231,.08);box-shadow:0 0 12px rgba(0,255,231,.3);}
.btn.ok{background:var(--a);color:#070d13;font-weight:900;box-shadow:0 0 14px rgba(0,255,231,.35);}
.btn.ok:hover{box-shadow:0 0 24px rgba(0,255,231,.6);}
.btn.bad{border-color:var(--r);color:var(--r);}
.btn.bad:hover{background:rgba(255,0,85,.07);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.lbl{display:block;font-size:9px;letter-spacing:.22em;color:rgba(0,255,231,.5);margin-bottom:5px;text-transform:uppercase;}
input{width:100%;background:rgba(0,255,231,.04);border:1px solid rgba(0,255,231,.18);color:#e0f0ff;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 10px;outline:none;border-radius:2px;transition:border-color .2s;}
input:focus{border-color:var(--a);}
input::placeholder{color:rgba(255,255,255,.15);}
.tabs{display:flex;border:1px solid rgba(0,255,231,.18);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.tab{flex:1;padding:9px;background:transparent;border:none;color:rgba(0,255,231,.42);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.13em;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.tab.on{background:rgba(0,255,231,.12);color:var(--a);}
.tc{display:none;}.tc.on{display:block;}
.prow{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:2px;margin-bottom:5px;}
.prow.me{border-color:rgba(0,255,231,.22);background:rgba(0,255,231,.035);}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.kp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:1px 4px;border-radius:2px;font-size:9px;}
.rb{flex:1;padding:7px 3px;font-size:12px;}
.rb.on{background:var(--a);color:#070d13;font-weight:900;}
.codebox{text-align:center;font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;letter-spacing:.38em;color:var(--a);padding:12px;border:1px solid rgba(0,255,231,.2);background:rgba(0,255,231,.04);cursor:pointer;border-radius:2px;}
.codebox:hover{border-color:var(--a);box-shadow:0 0 12px rgba(0,255,231,.22);}
.badge{font-size:9px;letter-spacing:.12em;color:var(--a);opacity:.5;flex-shrink:0;}
hr.d{border:none;border-top:1px solid rgba(255,255,255,.07);margin:10px 0;}
#game-screen{flex-direction:row;gap:0;padding:0;align-items:stretch;}
#sb{width:170px;min-width:110px;background:rgba(5,10,16,.99);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:14px 11px;gap:10px;flex-shrink:0;}
.sttl{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:.25em;color:rgba(0,255,231,.33);text-transform:uppercase;border-bottom:1px solid rgba(0,255,231,.1);padding-bottom:4px;}
.si{display:flex;align-items:center;gap:6px;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.snm{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.spt{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--a);}
.si.dead .snm,.si.dead .spt{opacity:.22;}.si.dead .sdot{filter:grayscale(1);opacity:.18;}
#ri{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:.18em;color:rgba(255,255,255,.22);text-align:center;margin-top:auto;}
#rn{font-size:18px;font-weight:900;color:rgba(255,255,255,.35);display:block;text-align:center;}
#gm{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#020608;}
#cv{display:block;image-rendering:pixelated;}
#gi{display:none;image-rendering:pixelated;max-width:100%;max-height:100%;object-fit:contain;}
#ov{position:absolute;inset:0;background:rgba(5,10,16,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;backdrop-filter:blur(4px);z-index:10;}
#ov.h{display:none;}
#ot{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,36px);font-weight:900;text-align:center;color:var(--a);}
#os{font-size:11px;color:rgba(255,255,255,.28);letter-spacing:.12em;text-align:center;}
.cdr{width:70px;height:70px;border-radius:50%;border:2px solid rgba(0,255,231,.15);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;color:var(--a);animation:pu 1s ease-in-out infinite;}
@keyframes pu{0%,100%{box-shadow:0 0 20px rgba(0,255,231,.3)}50%{box-shadow:0 0 38px rgba(0,255,231,.6)}}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(5,10,16,.97);border:1px solid var(--a);color:var(--a);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.11em;padding:7px 14px;border-radius:2px;transition:transform .28s;z-index:200;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#stbar{position:fixed;top:9px;right:11px;font-size:9px;letter-spacing:.11em;color:rgba(0,255,231,.33);display:flex;align-items:center;gap:5px;z-index:100;}
.st{width:5px;height:5px;border-radius:50%;background:var(--a);animation:bk 1.5s infinite;}
.st.off{background:var(--r);animation:none;}.st.cn{background:#ffcc00;}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.1}}
.hint{font-size:9px;color:rgba(255,255,255,.13);letter-spacing:.07em;text-align:center;line-height:1.9;}
</style>
</head>
<body>
<div id="app">
<div id="stbar"><div class="st off" id="st"></div><span id="stxt">OFFLINE</span></div>
<div id="toast"></div>

<!-- HOME -->
<div class="screen on" id="home-screen">
  <div><div class="TT">ACHTUNG<br>DIE KURVE</div><div style="font-size:11px;color:rgba(0,255,231,.38);letter-spacing:.3em;text-transform:uppercase;text-align:center;margin-top:4px">Online Multiplayer · 2–6 Spieler</div></div>
  <div class="panel" style="width:min(500px,96vw)">
    <div class="tabs">
      <button class="tab on" onclick="stab('local')">⌨ Lokal</button>
      <button class="tab" onclick="stab('online')">🌐 Online</button>
    </div>
    <div class="tc on" id="tc-local">
      <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.24em;color:var(--a);margin-bottom:12px;text-align:center">SPIELER</div>
      <div id="ll"></div>
      <div style="display:flex;gap:6px;margin-bottom:11px">
        <button class="btn" id="btnadd" onclick="addP()" style="flex:1">+ SPIELER</button>
        <button class="btn bad" onclick="remP()" style="flex:1">− SPIELER</button>
      </div>
      <div style="margin-bottom:11px"><label class="lbl">RUNDEN</label><div style="display:flex;gap:5px" id="rb-l"></div></div>
      <button class="btn ok" style="width:100%;padding:12px;font-size:12px" onclick="startLocal()">▶ STARTEN</button>
      <hr class="d" style="margin:11px 0 8px">
      <div class="hint">P1:← →&nbsp;&nbsp;P2:A D&nbsp;&nbsp;P3:Q W&nbsp;&nbsp;P4:H J&nbsp;&nbsp;P5:K L&nbsp;&nbsp;P6:N M</div>
    </div>
    <div class="tc" id="tc-online">
      <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.24em;color:var(--a);margin-bottom:12px;text-align:center">ONLINE</div>
      <div style="margin-bottom:10px"><label class="lbl">Dein Name</label><input id="oname" placeholder="Name..." maxlength="14"></div>
      <div style="margin-bottom:11px"><label class="lbl">Steuerung (auf deiner Tastatur)</label><div id="ctrlsel" style="display:flex;gap:5px;flex-wrap:wrap"></div></div>
      <div style="display:flex;gap:6px;margin-bottom:9px">
        <button class="btn ok" onclick="oCreate()" style="flex:1">RAUM ERSTELLEN</button>
        <button class="btn" onclick="togJoin()" style="flex:1">BEITRETEN</button>
      </div>
      <div id="jw" style="display:none;margin-bottom:8px">
        <label class="lbl">CODE (6 Zeichen)</label>
        <div style="display:flex;gap:6px">
          <input id="jcode" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:.32em;font-size:18px;text-align:center;flex:1" onkeydown="if(event.key==='Enter')oJoin()">
          <button class="btn ok" onclick="oJoin()">OK</button>
        </div>
      </div>
      <div id="pst" style="font-size:9px;color:rgba(0,255,231,.36);letter-spacing:.09em;text-align:center;margin-top:4px">Verbinde…</div>
    </div>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="wait-screen">
  <div class="TT" style="font-size:clamp(16px,3vw,30px)">WARTERAUM</div>
  <div class="panel" style="width:min(460px,96vw)">
    <div id="codewrap">
      <div style="font-size:9px;letter-spacing:.16em;color:rgba(0,255,231,.38);text-align:center;margin-bottom:6px">CODE — per WhatsApp teilen</div>
      <div class="codebox" id="codebox" onclick="cpCode()">------</div>
      <div style="font-size:9px;color:rgba(0,255,231,.22);text-align:center;margin-top:3px">Klicken zum Kopieren</div>
      <hr class="d" style="margin:12px 0">
    </div>
    <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.22em;color:var(--a);margin-bottom:11px;text-align:center">SPIELER (<span id="pcnt">0</span>/6)</div>
    <div id="wlist" style="margin-bottom:12px;min-height:38px"></div>
    <div id="rndwrap" style="margin-bottom:12px"><label class="lbl">RUNDEN</label><div style="display:flex;gap:5px" id="rb-w"></div></div>
    <div id="hctrl"><button class="btn ok" style="width:100%;padding:11px" onclick="hStart()">▶ SPIEL STARTEN</button></div>
    <div id="gwait" style="display:none;text-align:center;font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.14em;padding:9px">Warte auf Host…</div>
  </div>
  <button class="btn bad" style="width:min(150px,80vw)" onclick="leave()">VERLASSEN</button>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div id="sb">
    <div>
      <div class="sttl">PUNKTE</div>
      <div id="sclist" style="display:flex;flex-direction:column;gap:8px;margin-top:8px"></div>
    </div>
    <div id="ri"><span id="rn">1</span> / <span id="rtot">5</span><br>RUNDE</div>
  </div>
  <div id="gm">
    <canvas id="cv"></canvas>
    <img id="gi" alt="">
    <div id="ov">
      <div id="ot">BEREIT?</div>
      <div class="cdr" id="cdn">3</div>
      <div id="os"></div>
    </div>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const COLORS=['#00ffe7','#ff0055','#ffcc00','#00ff66','#ff6600','#cc44ff'];
const CNAMES=['Cyan','Rot','Gelb','Grün','Orange','Lila'];
const CTRL=[
  {l:'ArrowLeft',r:'ArrowRight',lb:'← →'},
  {l:'a',r:'d',lb:'A D'},
  {l:'q',r:'w',lb:'Q W'},
  {l:'h',r:'j',lb:'H J'},
  {l:'k',r:'l',lb:'K L'},
  {l:'n',r:'m',lb:'N M'},
];
const PN=['Spieler 1','Spieler 2','Spieler 3','Spieler 4','Spieler 5','Spieler 6'];

// Physics — fixed 600×600 logical canvas ALWAYS
const GS=600, SPD=2.8, TRN=0.040, LR=3, WL=10;
const GP=0.008, GMN=14, GMX=34, GRC=120, HD=LR+1.0;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let lp=[], sc={}, rnd=1, maxR=5;
let mode='local'; // 'local'|'host'|'guest'
let raf=null, gameState=null, tc=0, roundOver=false;
let peer=null, pid=null, conns=[], rp=[];
let myCtrl=0, isHost=false;

// Keys
const DW=new Set();
document.addEventListener('keydown',e=>{DW.add(e.key);if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>DW.delete(e.key));
window.addEventListener('blur',()=>DW.clear());
const dn=k=>DW.has(k)||DW.has(k.toUpperCase())||DW.has(k.toLowerCase());

// ═══════════════════════════════════════════════════════
//  MATH
// ═══════════════════════════════════════════════════════
function dSqPS(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;
  if(!l)return(px-ax)**2+(py-ay)**2;
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));
  return(px-(ax+t*dx))**2+(py-(ay+t*dy))**2;
}
function mkRng(seed){
  let s=seed>>>0;
  return()=>{s+=0x6d2b79f5;let t=s;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
function ss(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}
let _t=null;
function toast(m,ms=2800){const el=$('toast');el.textContent=m;el.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('show'),ms);}
const fk=k=>({ArrowLeft:'←',ArrowRight:'→',ArrowUp:'↑',ArrowDown:'↓'}[k])||k.toUpperCase();

function stab(t){
  ['local','online'].forEach(n=>$('tc-'+n).classList.toggle('on',n===t));
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===(t==='local'?0:1)));
  if(t==='online'&&(!peer||peer.destroyed))initPeer();
}
function setSt(s,l){$('st').className='st '+(s==='on'?'':s==='cn'?'cn':'off');$('stxt').textContent=l||s;}
function setPst(m){$('pst').textContent=m;}
function togJoin(){const e=$('jw');e.style.display=e.style.display==='none'?'block':'none';if(e.style.display==='block')$('jcode').focus();}

function mkRbs(cid){
  $(cid).innerHTML=[3,5,7,10,15].map(n=>
    `<button class="btn rb${n===maxR?' on':''}" onclick="setR(${n})">${n}</button>`).join('');
}
function setR(n){
  maxR=n;
  document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',+b.textContent===n));
  if(isHost)bcast({t:'cfg',maxR});
}

// ═══════════════════════════════════════════════════════
//  LOCAL PLAYERS
// ═══════════════════════════════════════════════════════
function initLP(){
  lp=[{name:PN[0],color:COLORS[0],ctrl:CTRL[0]},{name:PN[1],color:COLORS[1],ctrl:CTRL[1]}];
  renderLP();
}
function renderLP(){
  const el=$('ll');el.innerHTML='';
  lp.forEach((p,i)=>{
    const r=document.createElement('div');r.className='prow';
    r.innerHTML=`<div class="dot" style="background:${p.color};box-shadow:0 0 5px ${p.color}80"></div>
      <input value="${p.name}" maxlength="12" style="flex:1;background:transparent;border:none;color:#e0f0ff;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none" oninput="lp[${i}].name=this.value">
      <div style="display:flex;gap:3px"><span class="kp">${fk(p.ctrl.l)}</span><span class="kp">${fk(p.ctrl.r)}</span></div>`;
    el.appendChild(r);
  });
  $('btnadd').disabled=lp.length>=6;
}
function addP(){if(lp.length>=6)return;const i=lp.length;lp.push({name:PN[i],color:COLORS[i],ctrl:CTRL[i]});renderLP();}
function remP(){if(lp.length<=2){toast('Min. 2 Spieler!');return;}lp.pop();renderLP();}

// ═══════════════════════════════════════════════════════
//  CTRL PICKER (online)
// ═══════════════════════════════════════════════════════
function renderCtrl(){
  $('ctrlsel').innerHTML=CTRL.map((c,i)=>
    `<button class="btn rb${i===myCtrl?' on':''}" onclick="pickCtrl(${i})" style="font-size:10px;padding:5px 7px">${c.lb}</button>`).join('');
}
function pickCtrl(i){myCtrl=i;document.querySelectorAll('#ctrlsel button').forEach((b,j)=>b.classList.toggle('on',j===i));}

// ═══════════════════════════════════════════════════════
//  PEERJS
// ═══════════════════════════════════════════════════════
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function initPeer(){
  if(peer&&!peer.destroyed)return;
  setSt('cn','VERBINDE…');setPst('Verbinde…');
  peer=new Peer('ADK-'+genCode(),{host:'0.peerjs.com',port:443,path:'/',secure:true,debug:0,serialization:'json'});
  peer.on('open',id=>{pid=id;setSt('on','BEREIT');setPst('Bereit ✓');});
  peer.on('error',e=>{setSt('off','FEHLER');setPst('Fehler: '+e.type);toast('Fehler: '+e.type);});
  peer.on('disconnected',()=>peer.reconnect());
  peer.on('connection',c=>{if(isHost)accConn(c);});
}
function accConn(conn){
  conn.on('open',()=>{
    conns.push(conn);
    conn.on('data',d=>handleMsg(d,conn));
    conn.on('close',()=>{
      conns=conns.filter(c=>c!==conn);
      rp=rp.filter(p=>p.pid!==conn.peer);
      bcastRoom();renderW();
    });
    conn.send({t:'room',players:rp,maxR});
  });
}

// ═══════════════════════════════════════════════════════
//  MESSAGING
// ═══════════════════════════════════════════════════════
function bcast(msg){conns.forEach(c=>{try{c.send(msg);}catch(e){}});}
function toHost(msg){if(conns[0])try{conns[0].send(msg);}catch(e){}}

function handleMsg(d,from){
  switch(d.t){
    case 'join':
      if(!isHost)return;
      if(rp.length>=6){from.send({t:'err',m:'Raum voll!'});return;}
      // Use pid from message (reliable), fallback to conn.peer
      const guestPid = d.pid || from.peer;
      // Avoid duplicate joins
      if(rp.find(p=>p.pid===guestPid))return;
      rp.push({pid:guestPid,name:d.name,color:COLORS[rp.length],ctrlIdx:d.ci,isMe:false});
      bcastRoom();renderW();
      break;
    case 'room':
      // Authoritative room state from host
      rp=d.players.map(p=>({...p,isMe:p.pid===peer.id}));
      maxR=d.maxR;
      document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',+b.textContent===maxR));
      renderW();
      break;
    case 'cfg':
      maxR=d.maxR;
      document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',+b.textContent===maxR));
      break;
    case 'start':
      rp=d.players.map(p=>({...p,isMe:p.pid===peer.id}));
      maxR=d.maxR;sc={};rp.forEach(p=>sc[p.name]=0);rnd=1;
      guestStart();
      break;
    case 'keys':
      // Guest key state → host physics
      if(isHost&&gameState){
        const p=gameState.players.find(p=>p.pid===d.pid);
        if(p){p.rL=d.l;p.rR=d.r;}
      }
      break;
    case 'frame':
      // *** THE CORE: host sends canvas as JPEG, guest just shows it ***
      if(mode==='guest'){
        $('gi').src=d.img;
        if(d.sc){Object.assign(sc,d.sc);updSc();}
        if(d.rnd!==undefined){$('rn').textContent=d.rnd;$('rtot').textContent=d.maxR;}
        if(d.ov==='hide')hideOv();
        else if(d.ov==='show')showOv(d.ot||'',d.os||'');
        else if(d.ov==='winner')showWinner(d.winner,d.sc);
      }
      break;
    case 'goback':
      // Host sent everyone back to menu
      if(mode==='guest'){
        if(raf){cancelAnimationFrame(raf);raf=null;}
        gameState=null;mode='local';isHost=false;
        $('cv').style.display='block';$('gi').style.display='none';
        ss('home-screen');setSt('on','BEREIT');
      }
      break;
    case 'err':
      toast(d.m);break;
  }
}
function bcastRoom(){bcast({t:'room',players:rp,maxR});}

// ═══════════════════════════════════════════════════════
//  WAITING ROOM
// ═══════════════════════════════════════════════════════
function renderW(){
  const src=mode==='local'
    ?lp.map((p,i)=>({...p,pid:'L'+i,isMe:true,ctrlIdx:i}))
    :rp;
  $('pcnt').textContent=src.length;
  const el=$('wlist');el.innerHTML='';

    d.innerHTML=`
      <div class="dot" style="background:${p.color};box-shadow:0 0 5px ${p.color}80"></div>
      <div style="flex:1;font-size:13px">${p.name}</div>
      <span style="font-size:9px;color:${p.color};opacity:.75">${CNAMES[COLORS.indexOf(p.color)]||''}</span>
      ${p.isMe||mode==='local'?`<span class="kp">${fk(ctrl.l)}</span><span class="kp" style="margin-left:3px">${fk(ctrl.r)}</span>`:''}
      ${mode!=='local'&&i===0?'<span class="badge">HOST</span>':''}
      ${p.isMe&&mode!=='local'?'<span class="badge" style="color:rgba(255,204,0,.7)">DU</span>':''}`;

function cpCode(){
  const c=$('codebox').textContent;
  navigator.clipboard.writeText(c).catch(()=>{}).finally(()=>toast('Code: '+c));
}

// ═══════════════════════════════════════════════════════
//  CREATE / JOIN
// ═══════════════════════════════════════════════════════
function oCreate(){
  if(!peer||peer.destroyed){toast('Noch nicht verbunden…');return;}
  const name=$('oname').value.trim()||'Spieler 1';
  isHost=true;mode='host';conns=[];
  pid=peer.id||peer._id;
  rp=[{pid,name,color:COLORS[0],ctrlIdx:myCtrl,isMe:true}];
  openW(true);
}
function oJoin(){
  if(!peer||peer.destroyed){toast('Noch nicht verbunden…');return;}
  const raw=$('jcode').value.trim().toUpperCase();
  if(raw.length<4){toast('Code eingeben!');return;}
  const name=$('oname').value.trim()||'Spieler';
  isHost=false;mode='guest';conns=[];
  setSt('cn','VERBINDE…');

  // Make sure we have our own peer ID before connecting
  const doConnect = () => {
    const myId = peer.id;
    const conn=peer.connect('ADK-'+raw,{reliable:true,serialization:'json'});
    conns=[conn];
    conn.on('open',()=>{
      // Send join with our verified peer ID
      conn.send({t:'join',name,ci:myCtrl,pid:myId});
      conn.on('data',d=>handleMsg(d,conn));
      conn.on('close',()=>{toast('Verbindung getrennt!');leave();});
      openW(false);setSt('on','GAST · '+raw);toast('Verbunden ✓');
    });
    conn.on('error',e=>toast('Verbindungsfehler: '+e));
  };

  if(peer.id){
    doConnect();
  } else {
    // Wait for peer to fully open first
    peer.once('open', doConnect);
    toast('Verbinde mit Server…');
  }
}
function openW(host){
  const code=peer.id.replace('ADK-','');
  $('codebox').textContent=code;
  $('codewrap').style.display='block';
  $('rndwrap').style.display=host?'block':'none';
  $('hctrl').style.display=host?'block':'none';
  $('gwait').style.display=host?'none':'block';
  mkRbs('rb-w');renderW();ss('wait-screen');
  if(host){setSt('on','HOST · '+code);toast('Raum erstellt: '+code);}
}
function leave(){
  // Host: tell all guests to go back
  if(isHost)bcast({t:'goback'});
  conns.forEach(c=>{try{c.close();}catch(e){}});conns=[];rp=[];
  if(raf){cancelAnimationFrame(raf);raf=null;}
  DW.clear();gameState=null;mode='local';isHost=false;roundOver=false;
  $('cv').style.display='block';$('gi').style.display='none';
  setSt('on','BEREIT');ss('home-screen');
}

// ═══════════════════════════════════════════════════════
//  LOCAL START
// ═══════════════════════════════════════════════════════
function startLocal(){

}

// ═══════════════════════════════════════════════════════
//  HOST START
// ═══════════════════════════════════════════════════════
function hStart(){
  if(mode==='local'){
    sc={};lp.forEach(p=>sc[p.name]=0);rnd=1;
    goGame();return;
  }
  if(rp.length<2){toast('Min. 2 Spieler!');return;}
  sc={};rp.forEach(p=>sc[p.name]=0);rnd=1;
  bcast({t:'start',players:rp,maxR});
  goGame();
}
function goGame(){
  ss('game-screen');
  $('cv').style.display='block';$('gi').style.display='none';
  setTimeout(initRound,80);
}

// ═══════════════════════════════════════════════════════
//  GUEST START — shows img tag, sends keys in loop
// ═══════════════════════════════════════════════════════
function guestStart(){
  ss('game-screen');
  $('cv').style.display='none';
  const gi=$('gi');gi.style.display='block';
  gi.style.cssText='display:block;width:100%;height:100%;object-fit:contain;image-rendering:pixelated;';
  sc={};rp.forEach(p=>sc[p.name]=0);
  updSc();$('rn').textContent=rnd;$('rtot').textContent=maxR;
  showOv('WARTE…','Host startet');

  // Guest loop: ONLY sends keys to host — no physics here
  if(raf)cancelAnimationFrame(raf);
  function keyLoop(){
    if(mode!=='guest')return;
    const me=rp.find(p=>p.isMe);
    if(me){
      const c=CTRL[me.ctrlIdx||0];
      toHost({t:'keys',pid:peer.id,l:dn(c.l),r:dn(c.r)});
    }
    raf=requestAnimationFrame(keyLoop);
  }
  raf=requestAnimationFrame(keyLoop);
}

// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
function setupCanvas(){
  const cv=$('cv');
  // Always 600×600 physics — scale visually to fit
  cv.width=GS;cv.height=GS;
  const sb=$('sb');
  const avail=Math.min(window.innerWidth-sb.offsetWidth-4,window.innerHeight-4);
  const vsz=Math.floor(avail*0.985);
  cv.style.width=vsz+'px';cv.style.height=vsz+'px';
  return cv.getContext('2d');
}
window.addEventListener('resize',()=>{
  if($('game-screen').classList.contains('on')&&mode!=='guest'){
    const cv=$('cv');const sb=$('sb');
    const avail=Math.min(window.innerWidth-sb.offsetWidth-4,window.innerHeight-4);
    cv.style.width=Math.floor(avail*.985)+'px';cv.style.height=Math.floor(avail*.985)+'px';
  }
});

function drawField(ctx){
  ctx.fillStyle='#050c0f';ctx.fillRect(0,0,GS,GS);
  ctx.strokeStyle='rgba(0,255,231,.022)';ctx.lineWidth=1;
  for(let x=40;x<GS;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GS);ctx.stroke();}
  for(let y=40;y<GS;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GS,y);ctx.stroke();}
  drawWall(ctx);
}
function drawWall(ctx){
  ctx.fillStyle='rgba(0,255,231,.055)';
  ctx.fillRect(0,0,GS,WL);ctx.fillRect(0,GS-WL,GS,WL);ctx.fillRect(0,0,WL,GS);ctx.fillRect(GS-WL,0,WL,GS);
  ctx.strokeStyle='rgba(0,255,231,.88)';ctx.lineWidth=1.5;
  ctx.strokeRect(WL-.75,WL-.75,GS-2*WL+1.5,GS-2*WL+1.5);
  ctx.strokeStyle='rgba(0,255,231,.2)';ctx.lineWidth=1;ctx.strokeRect(.5,.5,GS-1,GS-1);
  const ca=16;ctx.strokeStyle='rgba(0,255,231,.5)';ctx.lineWidth=2;
  [[0,0,1,1],[GS,0,-1,1],[0,GS,1,-1],[GS,GS,-1,-1]].forEach(([cx,cy,sx,sy])=>{
    ctx.beginPath();ctx.moveTo(cx+sx*WL,cy+sy*2);ctx.lineTo(cx+sx*WL,cy+sy*(WL+ca));ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+sx*2,cy+sy*WL);ctx.lineTo(cx+sx*(WL+ca),cy+sy*WL);ctx.stroke();
  });
}

// ═══════════════════════════════════════════════════════
//  ROUND INIT
// ═══════════════════════════════════════════════════════
function initRound(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  DW.clear();tc=0;roundOver=false;
  const ctx=setupCanvas();
  drawField(ctx);

  const rng=mkRng(rnd*9999+42);
  const margin=WL+60;
  const src=mode==='local'?lp:rp;

  const players=src.map((p,i)=>{
    const ctrl=mode==='local'?p.ctrl:CTRL[p.ctrlIdx!=null?p.ctrlIdx:i]||CTRL[0];
    return {
      name:p.name,color:p.color,
      lk:ctrl.l,rk:ctrl.r,
      pid:p.pid||('L'+i),
      isLocal:mode==='local'||!!p.isMe,
      x:margin+rng()*(GS-2*margin),
      y:margin+rng()*(GS-2*margin),
      angle:rng()*Math.PI*2,
      alive:true,gap:false,gapT:0,
      trail:[], // [{x,y,px,py,tc}]
      rL:false,rR:false, // remote keys
      _px:0,_py:0,
    };
  });

  gameState={players,ctx};
  $('rn').textContent=rnd;$('rtot').textContent=maxR;
  updSc();

  // Send overlay to guests
  bcastFrame(ctx,true,'RUNDE '+rnd,'Bereit machen!');
  showOv('RUNDE '+rnd,'Bereit machen!');
  let cd=3;const cdEl=$('cdn');cdEl.textContent=cd;cdEl.style.display='flex';

  const timer=setInterval(()=>{
    cd--;
    if(cd<=0){
      clearInterval(timer);
      hideOv();
      // Tell guests to hide overlay via next frame
      runLoop(ctx,players);
    } else {
      cdEl.textContent=cd;
      bcastFrame(ctx,true,'RUNDE '+rnd,'Bereit machen!');
    }
  },1000);
}

// ═══════════════════════════════════════════════════════
//  HOST GAME LOOP
// ═══════════════════════════════════════════════════════
function runLoop(ctx,players){
  function tick(){
    if(roundOver)return;
    tc++;

    // ── STEER ──
    players.forEach(p=>{
      if(!p.alive)return;
      const L=p.isLocal?dn(p.lk):p.rL;
      const R=p.isLocal?dn(p.rk):p.rR;
      if(L)p.angle-=TRN;
      if(R)p.angle+=TRN;
    });

    // ── GAP ──
    players.forEach(p=>{
      if(!p.alive)return;
      if(p.gap){if(--p.gapT<=0)p.gap=false;}
      else if(Math.random()<GP){p.gap=true;p.gapT=GMN+Math.floor(Math.random()*(GMX-GMN));}
    });

    // ── MOVE + COLLIDE + PAINT ──
    players.forEach(p=>{
      if(!p.alive)return;
      p._px=p.x;p._py=p.y;
      const nx=p.x+Math.cos(p.angle)*SPD;
      const ny=p.y+Math.sin(p.angle)*SPD;

      // Wall
      if(nx<=WL||nx>=GS-WL||ny<=WL||ny>=GS-WL){doKill(ctx,p);return;}

      // Trail collision (swept segment vs segment)
      if(!p.gap){
        const hSq=HD*HD;
        outer:for(let pi=0;pi<players.length;pi++){
          const o=players[pi];
          const self=o===p;
          const trail=o.trail;
          for(let ti=0;ti<trail.length;ti++){
            const dot=trail[ti];
            // Skip own recent dots (grace period)
            if(self&&(tc-dot.tc)<GRC)continue;
            // Fast bounding box reject
            if(nx<Math.min(dot.px,dot.x)-HD||nx>Math.max(dot.px,dot.x)+HD)continue;
            if(ny<Math.min(dot.py,dot.y)-HD||ny>Math.max(dot.py,dot.y)+HD)continue;
            // Exact point-to-segment distance
            if(dSqPS(nx,ny,dot.px,dot.py,dot.x,dot.y)<hSq){doKill(ctx,p);break outer;}
          }
          if(!p.alive)break;
        }
      }
      if(!p.alive)return;

      // Paint trail
      if(!p.gap){
        p.trail.push({x:nx,y:ny,px:p._px,py:p._py,tc});
        ctx.beginPath();ctx.arc(nx,ny,LR,0,Math.PI*2);
        ctx.fillStyle=p.color;ctx.fill();
      }
      p.x=nx;p.y=ny;
    });

    // ── DRAW HEADS ──
    players.forEach(p=>{
      if(!p.alive)return;
      ctx.beginPath();ctx.arc(p.x,p.y,LR+3,0,Math.PI*2);ctx.fillStyle=p.color+'28';ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,LR+1.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,LR,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
    });
    drawWall(ctx);

    // ── STREAM FRAME TO GUESTS ──
    bcastFrame(ctx,false);

    // ── CHECK ALIVE ──
    const alive=players.filter(p=>p.alive);
    if(alive.length<=1){endRound(players,alive,ctx);return;}
    raf=requestAnimationFrame(tick);
  }
  raf=requestAnimationFrame(tick);
}

// Stream canvas as JPEG to all guests
function bcastFrame(ctx,showOv,ovTitle,ovSub){
  if(mode==='host'&&conns.length>0){
    const cv=$('cv');
    bcast({
      t:'frame',
      img:cv.toDataURL('image/jpeg',0.55),
      sc:{...sc},rnd,maxR,
      ov:showOv?'show':'hide',
      ot:ovTitle||'',os:ovSub||'',
    });
  }
}

function doKill(ctx,p){
  p.alive=false;
  ctx.save();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2,r=5+Math.random()*9;
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*r,p.y+Math.sin(a)*r);
    ctx.strokeStyle=p.color;ctx.lineWidth=1.5;ctx.globalAlpha=.75;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.globalAlpha=1;ctx.fill();
  ctx.restore();
  updSc();
}

// ═══════════════════════════════════════════════════════
//  ROUND END
// ═══════════════════════════════════════════════════════
function endRound(players,alive,ctx){
  if(roundOver)return;
  roundOver=true;
  if(raf){cancelAnimationFrame(raf);raf=null;}

  // Points: 1st gets N pts, 2nd gets N-1, etc.
  const n=players.length;
  const dead=players.filter(p=>!p.alive);
  const ranking=[...alive,...[...dead].reverse()];
  const msgs=[];
  ranking.forEach((p,i)=>{
    const pts=Math.max(0,n-i);
    sc[p.name]=(sc[p.name]||0)+pts;
    if(pts>0)msgs.push(p.name+' +'+pts);
  });
  toast(msgs.join('  |  '));
  updSc();

  if(rnd>=maxR){
    // Game over — find winner
    const winner=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0];
    setTimeout(()=>{
      // Broadcast winner frame to guests
      if(mode==='host'){
        bcast({t:'frame',img:$('cv').toDataURL('image/jpeg',.55),sc:{...sc},rnd,maxR,ov:'winner',winner});
      }
      showWinner(winner,sc);
    },2400);
  } else {
    setTimeout(()=>{
      rnd++;
      if(mode==='host') bcast({t:'frame',img:$('cv').toDataURL('image/jpeg',.55),sc:{...sc},rnd,maxR,ov:'hide'});
      initRound();
    },2400);
  }
}

// ═══════════════════════════════════════════════════════
//  WINNER SCREEN
// ═══════════════════════════════════════════════════════
function showWinner(name,scores){
  if(scores)Object.assign(sc,scores);
  const src=mode==='local'?lp:rp;
  const p=src.find(p=>p.name===name);
  const c=p?p.color:'var(--a)';
  updSc();
  $('ot').innerHTML=`<div style="font-size:11px;letter-spacing:.28em;color:rgba(255,255,255,.26);margin-bottom:7px">🏆 GEWINNER</div><div style="color:${c};text-shadow:0 0 26px ${c}">${name}</div>`;
  $('cdn').style.display='none';

  if(mode==='guest'){
    // Guests see result but only host controls restart/menu
    $('os').innerHTML=`<div style="margin-top:12px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.12em">Warte auf Host…</div>`;
  } else {
    // Host: buttons trigger for everyone
    $('os').innerHTML=`<div style="display:flex;gap:10px;margin-top:13px">
      <button class="btn ok" onclick="allRestart()">NOCHMAL</button>
      <button class="btn" onclick="allMenu()">MENÜ</button>
    </div>`;
  }
  $('ov').classList.remove('h');
}

// Host triggers restart for ALL
function allRestart(){
  sc={};const src=mode==='local'?lp:rp;src.forEach(p=>sc[p.name]=0);rnd=1;
  $('cdn').style.display='flex';
  if(mode==='host') bcast({t:'frame',img:$('cv').toDataURL('image/jpeg',.4),sc:{...sc},rnd,maxR,ov:'hide'});
  // Guests will receive next round via frame stream
  initRound();
}

// Host sends everyone to menu
function allMenu(){
  bcast({t:'goback'});
  leave();
}

function showOv(t,s){$('ov').classList.remove('h');$('ot').textContent=t;$('ot').style.color='var(--a)';$('os').textContent=s||'';$('cdn').style.display='flex';}
function hideOv(){$('ov').classList.add('h');}

function updSc(){
  const src=mode==='local'?lp:rp;
  const sorted=[...src].sort((a,b)=>(sc[b.name]||0)-(sc[a.name]||0));
  const el=$('sclist');el.innerHTML='';
  sorted.forEach(p=>{
    const dead=gameState?.players.find(g=>g.name===p.name)?.alive===false;
    const d=document.createElement('div');d.className='si'+(dead?' dead':'');
    d.innerHTML=`<div class="sdot" style="background:${p.color};box-shadow:0 0 4px ${p.color}"></div>
      <div class="snm">${p.name}</div><div class="spt">${sc[p.name]||0}</div>`;
    el.appendChild(d);
  });
}

initLP();mkRbs('rb-l');mkRbs('rb-w');renderCtrl();
setTimeout(()=>{try{initPeer();}catch(e){}},400);
